    <script>
      var DATA = JSON.parse(document.getElementById("data").textContent);
      var TAB_LABELS = {
        ru: { privacy: "Политика конфиденциальности", terms: "Условия использования" },
        uk: { privacy: "Політика конфіденційності", terms: "Умови використання" },
        en: { privacy: "Privacy Policy", terms: "Terms of Use" }
      };
      var BACK_LABELS = { ru: "На главную", uk: "На головну", en: "Back to home" };
      var initialDoc = location.hash.replace("#", "") === "terms" ? "terms" : "privacy";
      var state = { lang: "ru", doc: initialDoc };

      function render() {
        document.documentElement.lang = state.lang;
        // language buttons
        document.querySelectorAll("#langs button").forEach(function (b) {
          b.classList.toggle("active", b.dataset.lang === state.lang);
        });
        // tab buttons + labels
        document.querySelectorAll("#tabs button").forEach(function (b) {
          b.textContent = TAB_LABELS[state.lang][b.dataset.doc];
          b.classList.toggle("active", b.dataset.doc === state.doc);
        });
        document.querySelector("#backHome span").textContent = BACK_LABELS[state.lang];
        var d = DATA[state.doc][state.lang];
        document.title = "CivSafe — " + d.title;
        var html = "<h1>" + d.title + "</h1>";
        html += '<p class="updated">' + d.updated + "</p>";
        d.intro.forEach(function (p) { html += '<p class="intro">' + p + "</p>"; });
        d.sections.forEach(function (s) {
          html += "<section><h2>" + s.heading + "</h2>";
          s.body.forEach(function (p) { html += '<p class="p">' + p + "</p>"; });
          html += "</section>";
        });
        document.getElementById("content").innerHTML = html;
      }

      document.getElementById("langs").addEventListener("click", function (e) {
        if (e.target.dataset.lang) { state.lang = e.target.dataset.lang; render(); }
      });
      document.getElementById("tabs").addEventListener("click", function (e) {
        if (e.target.dataset.doc) {
          state.doc = e.target.dataset.doc;
          if (history.replaceState) history.replaceState(null, "", "#" + state.doc);
          render();
        }
      });
      window.addEventListener("hashchange", function () {
        state.doc = location.hash.replace("#", "") === "terms" ? "terms" : "privacy";
        render();
      });
      render();
    </script>

</html>
