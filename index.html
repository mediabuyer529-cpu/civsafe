      var FEAT_ICONS = [
        '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
        '<path d="M4 4h16v12H4z"/><path d="M2 20h20"/>',

        '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5 14a19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 3.92 3h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8 11a16 16 0 0 0 5 5l1.36-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',

        '<path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/>'
      ];

      var state = { lang: "ru" };

      function setStoreBtn(btn, d) {
        var small = btn.querySelector("[data-store-small]");
        if (small) small.textContent = d.storeSmall;
        if (APP_STORE_URL && APP_STORE_URL.length > 0) {
          btn.href = APP_STORE_URL; btn.setAttribute("target", "_blank"); btn.setAttribute("rel", "noopener");
          btn.onclick = null;
        } else {
          btn.href = "#"; btn.onclick = function (e) { e.preventDefault(); };
        }
      }

      function apply() {
        var d = T[state.lang];
        document.documentElement.lang = state.lang;
        document.querySelectorAll("#langs button").forEach(function (b) {
          b.classList.toggle("active", b.dataset.lang === state.lang);
        });
        document.getElementById("h1").innerHTML = '<span class="o">' + d.h1a + "</span>" + d.h1b;
        document.getElementById("valueH2").innerHTML = '<span class="o">' + d.valueH2a + "</span>" + d.valueH2b;
        document.querySelectorAll("[data-t]").forEach(function (el) {
          var k = el.dataset.t;
          if (d[k] !== undefined) el.textContent = d[k];
        });
        setStoreBtn(document.getElementById("storeBtn1"), d);
        setStoreBtn(document.getElementById("storeBtn2"), d);

        document.getElementById("vgrid").innerHTML = d.values.map(function (v) {
          return '<div class="vpt"><h3>' + v.h + ' <span>' + v.t + "</span></h3><p>" + v.d + "</p></div>";
        }).join("");

        document.getElementById("featGrid").innerHTML = d.features.map(function (f, i) {
          return '<div class="feat"><div class="ic"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">' +
            FEAT_ICONS[i] + "</svg></div><h3>" + f.t + "</h3><p>" + f.d + "</p></div>";
        }).join("");

        buildSlides(d);
      }

      var slider = { idx: 0, count: 0, timer: null, startX: 0, dx: 0, dragging: false };

      function buildSlides(d) {
        var html = SHOTS.map(function (s, i) {
          return '<div class="slide"><img src="shots/' + s + "-" + state.lang + '.jpg" alt="" ' +
            (i === 0 ? 'loading="eager"' : 'loading="lazy"') + "></div>";
        }).join("");
        html += '<div class="slide"><div class="slide-cta">' +
          '<div class="lock"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>' +
          "<h3>" + d.sliderMoreTitle + "</h3>" +
          "<p>" + d.sliderMoreText + "</p>" +
          '<a class="appstore" id="storeBtn3" href="#"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="' + APPLE_PATH + '"/></svg>' +
          '<span class="t"><span class="s1">' + d.storeSmall + '</span><span class="s2">App Store</span></span></a>' +
          "</div></div>";
        document.getElementById("slides").innerHTML = html;
        slider.count = SHOTS.length + 1;
        slider.idx = 0;
        setStoreBtn(document.getElementById("storeBtn3"), d);
        buildDots();
        goTo(0, false);
        startAuto();
      }

      function buildDots() {
        var dots = document.getElementById("dots");
        var html = "";
        for (var i = 0; i < slider.count; i++) html += '<button type="button" aria-label="slide"></button>';
        dots.innerHTML = html;
        dots.querySelectorAll("button").forEach(function (b, k) {
          b.addEventListener("click", function () { goTo(k, true); startAuto(); });
        });
      }

      function goTo(i, animate) {
        if (i < 0) i = slider.count - 1;
        if (i >= slider.count) i = 0;
        slider.idx = i;
        var track = document.getElementById("slides");
        track.classList.toggle("anim", !!animate);
        track.style.transform = "translateX(" + (-i * 100) + "%)";
        document.querySelectorAll("#dots button").forEach(function (b, k) {
          b.classList.toggle("active", k === i);
          if (k === i) b.setAttribute("aria-current", "true");
          else b.removeAttribute("aria-current");
        });
      }

      function startAuto() {
        stopAuto();
        slider.timer = setInterval(function () { goTo(slider.idx + 1, true); }, 3000);
      }
      function stopAuto() { if (slider.timer) { clearInterval(slider.timer); slider.timer = null; } }

      function initSwipe() {
        var screen = document.querySelector(".phone-screen");
        var track = document.getElementById("slides");
        screen.addEventListener("pointerdown", function (e) {
          slider.dragging = true; slider.startX = e.clientX; slider.dx = 0;
          track.classList.remove("anim"); stopAuto();
          try { screen.setPointerCapture(e.pointerId); } catch (err) {}
        });
        screen.addEventListener("pointermove", function (e) {
          if (!slider.dragging) return;
          slider.dx = e.clientX - slider.startX;
          var pct = (slider.dx / screen.clientWidth) * 100;
          track.style.transform = "translateX(" + (-slider.idx * 100 + pct) + "%)";
        });
        function end() {
          if (!slider.dragging) return;
          slider.dragging = false;
          var threshold = screen.clientWidth * 0.18;
          if (slider.dx > threshold) goTo(slider.idx - 1, true);
          else if (slider.dx < -threshold) goTo(slider.idx + 1, true);
          else goTo(slider.idx, true);
          startAuto();
        }
        screen.addEventListener("pointerup", end);
        screen.addEventListener("pointercancel", end);
        screen.addEventListener("lostpointercapture", end);
        screen.addEventListener("mouseenter", stopAuto);
        screen.addEventListener("mouseleave", function () { if (!slider.dragging) startAuto(); });
      }

      document.getElementById("langs").addEventListener("click", function (e) {
        if (e.target.dataset.lang) { state.lang = e.target.dataset.lang; apply(); }
      });
      apply();
      initSwipe();
    </script>
